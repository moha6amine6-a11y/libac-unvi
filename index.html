<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIBAC | LIBAC</title>
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--ink:#17110A;
--teal:#392A14;
--teal-2:#6E4E16;
--teal-light:#F4E7C8;
--gold:#F8D61B;
--gold-light:#FFF4AE;
--paper:#FFFDF6;
--text:#211B12;
--muted:#6B6256;
--danger:#8C2F39;
--danger-light:#F6E4E6;
--radius:16px;
--shadow: 0 8px 24px rgba(14,46,44,0.10);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
background:var(--paper);
color:var(--text);
font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif;
line-height:1.7;
min-height:100vh;
}
body.lang-en, body.lang-fr{ font-family:'IBM Plex Sans','IBM Plex Sans Arabic',sans-serif; }
h1,h2,h3,h4,.brand-name,.btn,.tab-btn{ font-family:'Cairo',sans-serif; }
a{color:inherit;text-decoration:none;}
button{font:inherit;cursor:pointer;}
ul{margin:0;padding:0;list-style:none;}
img{max-width:100%;display:block;}

/* ---------- Header ---------- */
.site-header{
position:sticky; top:0; z-index:40;
background:rgba(255,253,246,0.92);
border-bottom:1px solid rgba(14,46,44,0.08);
backdrop-filter:blur(6px);
}
.header-inner{
max-width:1100px; margin:0 auto; padding:14px 20px;
display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.brand{ display:flex; align-items:center; gap:10px; cursor:pointer; }
.brand-name{ font-family:Georgia,'Times New Roman',serif; font-weight:800; font-size:1.7rem; color:var(--gold); letter-spacing:1px; line-height:1; text-shadow:0 1px 0 #4b3500;}
.brand-sub{ font-size:0.68rem; color:var(--muted); margin-top:-2px; }
.header-right{ display:flex; align-items:center; gap:10px; }
.lang-switch{ display:flex; border:1.5px solid var(--teal); border-radius:999px; overflow:hidden; }
.lang-switch button{
background:transparent; border:none; padding:6px 12px; font-size:0.78rem; font-weight:700;
color:var(--teal); transition:.15s;
}
.lang-switch button.active{ background:var(--teal); color:#fff; }
.hamburger{
width:42px;height:42px;border-radius:12px;border:1.5px solid var(--teal);
background:#fff; display:flex; align-items:center; justify-content:center;
}
.hamburger svg{width:20px;height:20px;color:var(--teal);}

/* ---------- Side menu ---------- */
.menu-overlay{
position:fixed; inset:0; background:rgba(14,46,44,0.45);
opacity:0; pointer-events:none; transition:.25s; z-index:60;
}
.menu-overlay.open{ opacity:1; pointer-events:auto; }
.menu-panel{
position:fixed; top:0; inset-inline-end:0; height:100%; width:min(320px,86vw);
background:var(--ink); color:#fff; z-index:61;
transform:translateX(110%); transition:.3s ease;
display:flex; flex-direction:column; padding:22px;
}
[dir="rtl"] .menu-panel{ transform:translateX(-110%); }
.menu-panel.open{ transform:translateX(0); }
.menu-close{
align-self:flex-start; width:36px;height:36px; border-radius:10px; border:1px solid rgba(255,255,255,0.25);
background:transparent; color:#fff; display:flex; align-items:center; justify-content:center; margin-bottom:20px;
}
.menu-close svg{width:16px;height:16px;}
.menu-section-title{ font-size:0.72rem; letter-spacing:1px; color:var(--gold-light); margin:18px 0 8px; text-transform:uppercase; opacity:0.85;}
.menu-link{
display:flex; align-items:center; gap:10px; padding:11px 10px; border-radius:10px;
font-weight:700; font-size:0.98rem; color:#fff; opacity:0.92;
}
.menu-link:hover{ background:rgba(255,255,255,0.08); }
.menu-field-link{ display:flex; align-items:center; justify-content:space-between; padding:9px 10px; border-radius:8px; font-size:0.88rem; opacity:0.85; }
.menu-field-link:hover{ background:rgba(255,255,255,0.07); }
.menu-field-count{ background:rgba(255,255,255,0.14); border-radius:999px; padding:1px 8px; font-size:0.72rem; }
.menu-admin-btn{
margin-top:auto; border:1.5px solid var(--gold); color:var(--gold-light);
background:transparent; border-radius:10px; padding:11px; font-weight:700; text-align:center;
}
.menu-admin-btn.on{ background:var(--gold); color:var(--ink); border-color:var(--gold);}

/* ---------- Layout helpers ---------- */
.wrap{ max-width:1100px; margin:0 auto; padding:0 20px; }
.section{ padding:56px 0; }
.eyebrow{ font-size:0.78rem; font-weight:700; letter-spacing:1px; color:var(--gold); text-transform:uppercase; }

/* ---------- Hero ---------- */
.hero{
background:radial-gradient(1200px 500px at 15% -10%, #14615a 0%, var(--teal) 45%, var(--ink) 100%);
color:#fff; position:relative; overflow:hidden;
padding:64px 0 80px;
}
.hero-inner{ max-width:1100px; margin:0 auto; padding:0 20px; position:relative; z-index:2;}
.hero-compass{ position:absolute; inset-inline-end:-60px; top:-40px; width:340px; height:340px; opacity:0.16; z-index:1;}
.hero h1{ font-size:clamp(2rem,5vw,3.1rem); font-weight:900; margin:10px 0 16px; max-width:680px; }
.hero p{ font-size:1.05rem; color:#DDEDE9; max-width:600px; margin:0 0 26px; }
.hero-actions{ display:flex; gap:12px; flex-wrap:wrap; }
.btn{ display:inline-flex; align-items:center; gap:8px; padding:13px 22px; border-radius:11px; font-weight:700; font-size:0.95rem; border:none; }
.btn-gold{ background:var(--gold); color:var(--ink); }
.btn-gold:hover{ background:#dba936; }
.btn-outline{ background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,0.55); }
.btn-outline:hover{ border-color:#fff; }
.btn-teal{ background:var(--teal); color:#fff; }
.btn-danger{ background:var(--danger); color:#fff; }
.btn-ghost{ background:transparent; color:var(--teal); border:1.5px solid var(--teal); }
.btn-sm{ padding:8px 14px; font-size:0.82rem; border-radius:8px; }

/* ---------- Start here / steps ---------- */
.steps{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:14px;}
.step{ background:#fff; border:1px solid rgba(14,46,44,0.08); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); position:relative;}
.step-num{ width:36px;height:36px;border-radius:50%; background:var(--teal-light); color:var(--teal); font-weight:800; display:flex; align-items:center; justify-content:center; margin-bottom:14px;}
.step h3{ margin:0 0 8px; font-size:1.05rem; color:var(--ink);}
.step p{ margin:0; color:var(--muted); font-size:0.92rem;}

/* ---------- Fields grid ---------- */
.section-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:26px; flex-wrap:wrap;}
.section-head h2{ font-size:1.7rem; margin:6px 0 4px; color:var(--ink);}
.section-head p{ margin:0; color:var(--muted); max-width:520px;}
.fields-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; }
.field-card{
background:#fff; border:1px solid rgba(14,46,44,0.08); border-radius:var(--radius); padding:22px;
box-shadow:var(--shadow); display:flex; flex-direction:column; gap:12px; transition:.15s; position:relative;
}
.field-card:hover{ transform:translateY(-3px); border-color:var(--gold); }
.field-icon{ width:48px;height:48px; border-radius:12px; background:var(--teal-light); color:var(--teal); display:flex; align-items:center; justify-content:center;}
.field-icon svg{ width:26px; height:26px; }
.field-card h3{ margin:0; font-size:1.12rem; color:var(--ink);}
.field-meta{ color:var(--muted); font-size:0.85rem; display:flex; align-items:center; gap:6px;}
.field-card .go{ margin-top:auto; color:var(--teal); font-weight:700; font-size:0.86rem; display:flex; align-items:center; gap:6px;}

/* ---------- Majors grid ---------- */
.majors-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
.major-card{
background:#fff; border:1px solid rgba(14,46,44,0.08); border-radius:var(--radius); padding:22px;
box-shadow:var(--shadow); display:flex; flex-direction:column; gap:10px;
}
.major-badge{
width:42px;height:42px;border-radius:50%; background:var(--gold-light); color:var(--ink);
font-weight:800; display:flex; align-items:center; justify-content:center; font-size:.9rem; overflow:hidden;
}
.major-badge img{width:100%;height:100%;object-fit:cover;}
.major-card h3{ margin:0; font-size:1.1rem; color:var(--ink);}
.major-card .uni{ color:var(--muted); font-size:0.85rem; display:flex; gap:6px; align-items:flex-start;}
.major-card .go{ margin-top:auto; color:var(--teal); font-weight:700; font-size:0.86rem; }
.empty-box{
grid-column:1/-1; text-align:center; padding:50px 20px; background:#fff; border:1.5px dashed rgba(14,46,44,0.2);
border-radius:var(--radius); color:var(--muted);
}
.empty-box h3{ color:var(--ink); margin:10px 0 6px;}

/* ---------- Breadcrumb ---------- */
.crumb{ display:flex; align-items:center; gap:8px; color:var(--muted); font-size:0.86rem; margin-bottom:18px; flex-wrap:wrap;}
.crumb a{ color:var(--teal); font-weight:600; }
.crumb .sep{ opacity:0.5; }

/* ---------- Major detail ---------- */
.detail-top{
background:#fff; border:1px solid rgba(14,46,44,0.08); border-radius:var(--radius); padding:28px;
box-shadow:var(--shadow); display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; margin-bottom:22px;
}
.detail-badge{ width:58px;height:58px; border-radius:15px; background:var(--gold-light); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.1rem; color:var(--ink); overflow:hidden; flex-shrink:0;}
.detail-badge img{width:100%;height:100%;object-fit:cover;}
.detail-top h1{ margin:0 0 6px; font-size:1.7rem; color:var(--ink);}
.field-chip{ display:inline-block; background:var(--teal-light); color:var(--teal); font-size:0.76rem; font-weight:700; padding:4px 12px; border-radius:999px; margin-bottom:8px;}
.info-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-top:10px;}
.info-item{ font-size:0.88rem; }
.info-item .label{ color:var(--muted); font-size:0.74rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px;}
.info-item .value{ font-weight:700; color:var(--ink); display:flex; align-items:center; gap:6px;}

.card{
background:#fff; border:1px solid rgba(14,46,44,0.08); border-radius:var(--radius); padding:24px;
box-shadow:var(--shadow); margin-bottom:18px;
}
.card h2{ font-size:1.15rem; margin:0 0 14px; color:var(--ink); display:flex; align-items:center; gap:8px;}
.card h2 svg{width:20px;height:20px;color:var(--gold);}
.chip-list{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{ background:var(--teal-light); color:var(--teal-2); font-size:0.85rem; font-weight:600; padding:7px 13px; border-radius:999px; }
.careers-list{ display:grid; gap:10px;}
.careers-list li{ display:flex; gap:10px; align-items:flex-start; font-size:0.94rem;}
.careers-list svg{ width:16px;height:16px; color:var(--gold); margin-top:4px; flex-shrink:0;}
.tip-box{ border-radius:12px; padding:16px 18px; font-size:0.92rem; }
.tip-before{ background:#EEF6F3; border:1px solid #CFE6DD; }
.tip-after{ background:var(--gold-light); border:1px solid #E4C775; }
.tip-label{ font-weight:800; margin-bottom:6px; color:var(--ink); font-size:0.88rem; display:flex; align-items:center; gap:6px;}

.social-row{ display:flex; gap:10px; flex-wrap:wrap; }
.social-btn{
display:flex; align-items:center; gap:8px; padding:9px 15px; border-radius:10px; background:var(--teal-light);
color:var(--teal); font-weight:700; font-size:0.86rem;
}
.social-btn:hover{ background:var(--teal); color:#fff; }
.social-btn svg{width:16px;height:16px;}
.no-contact{ color:var(--muted); font-size:0.9rem; }

/* ---------- Admin ---------- */
.admin-bar{
background:var(--gold-light); border:1px solid #E4C775; border-radius:12px; padding:10px 16px;
display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:18px; font-size:0.85rem; color:var(--ink); font-weight:700;
}
.admin-actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.modal-overlay{
position:fixed; inset:0; background:rgba(14,46,44,0.55); z-index:80; display:none;
align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;
}
.modal-overlay.open{ display:flex; }
.modal{
background:#fff; border-radius:18px; width:100%; max-width:640px; padding:26px; box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal h2{ margin:0 0 4px; color:var(--ink); }
.modal .sub{ color:var(--muted); font-size:0.85rem; margin-bottom:18px;}
.form-row{ margin-bottom:14px; }
.form-row label{ display:block; font-size:0.82rem; font-weight:700; color:var(--ink); margin-bottom:6px;}
.form-row input, .form-row select, .form-row textarea{
width:100%; padding:10px 12px; border-radius:9px; border:1.5px solid #DDE6E2; font:inherit; font-size:0.92rem; background:#FCFBF8;
}
.form-row textarea{ min-height:70px; resize:vertical; }
.form-hint{ font-size:0.74rem; color:var(--muted); margin-top:4px;}
.tabs{ display:flex; gap:6px; margin-bottom:16px; border-bottom:1.5px solid #EEE; }
.tab-btn{ padding:9px 16px; background:none; border:none; font-weight:700; color:var(--muted); border-bottom:2.5px solid transparent; }
.tab-btn.active{ color:var(--teal); border-color:var(--teal); }
.tab-content{ display:none; }
.tab-content.active{ display:block; }
.modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
.form-grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media (max-width:520px){ .form-grid2{ grid-template-columns:1fr; } }

/* ---------- Footer ---------- */
.footer{ border-top:1px solid rgba(14,46,44,0.1); padding:30px 0; margin-top:40px; }
.footer .wrap{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
.footer-brand{ font-weight:800; color:var(--ink); }
.footer-note{ color:var(--muted); font-size:0.82rem; }

@media (max-width:760px){
.steps{ grid-template-columns:1fr; }
.hero-compass{ display:none; }
}

/* ---------- LIBAC visual identity + color mode ---------- */
body{ transition:background .25s,color .25s; }
.brand-mark{ position:relative; width:96px; height:48px; overflow:hidden; border-radius:12px; background:linear-gradient(135deg,#070707,#39240b); border:1px solid rgba(248,214,27,.65); box-shadow:0 0 18px rgba(248,214,27,.22); flex:0 0 auto; display:grid; place-items:center; }
.brand-mark::after{ content:'LIBAC'; position:absolute; inset:0; display:grid; place-items:center; color:var(--gold); font-family:Georgia,serif; font-weight:800; letter-spacing:1.2px; font-size:1.12rem; text-shadow:0 1px 8px #000; }
.theme-toggle{ width:52px; height:42px; border-radius:12px; border:1.5px solid var(--gold); background:#17110A; color:var(--gold); display:grid; place-items:center; font-size:0; transition:.2s; }
.theme-toggle::after{ content:'DARK'; font-size:.64rem; font-weight:800; letter-spacing:.4px; }
body.dark .theme-toggle::after{ content:'LIGHT'; }
.theme-toggle:hover{ transform:translateY(-1px); box-shadow:0 4px 14px rgba(248,214,27,.25); }
.hero{ background:radial-gradient(600px 300px at 85% 25%,rgba(248,214,27,.30),transparent 60%), radial-gradient(700px 360px at 10% 85%,rgba(145,78,31,.38),transparent 65%),#080808; border-bottom:3px solid var(--gold); }
.hero::before{ content:''; position:absolute; inset:0; background:url('./libac-brand-reference.png') center/cover no-repeat; opacity:.12; mix-blend-mode:screen; }
.hero h1{ color:#fffbe4; }
.hero p{ color:#eee5d2; }
.eyebrow{ color:var(--gold-light); }
.btn-gold{ background:var(--gold); color:#17110A; box-shadow:0 6px 18px rgba(248,214,27,.22); }
.btn-gold:hover{ background:#fff05c; }
.field-icon{ background:#17110A; color:var(--gold); border-color:rgba(248,214,27,.48); }
.card:hover,.major-card:hover{ border-color:var(--gold); box-shadow:0 12px 28px rgba(68,45,7,.15); }
body.dark{ --ink:#fff8df; --teal:#f8d61b; --teal-2:#f8d61b; --teal-light:#2b251a; --gold:#f8d61b; --gold-light:#fff4ae; --paper:#0c0b09; --text:#f8f0dc; --muted:#c2b9a8; --danger-light:#3b2022; --shadow:0 8px 24px rgba(0,0,0,.42); }
body.dark .site-header{ background:rgba(12,11,9,.92); border-color:rgba(248,214,27,.18); }
body.dark .lang-switch{ border-color:var(--gold); }
body.dark .lang-switch button{ color:var(--gold); }
body.dark .lang-switch button.active{ background:var(--gold); color:#17110A; }
body.dark .hamburger, body.dark .theme-toggle{ background:#17110A; color:var(--gold); border-color:var(--gold); }
body.dark .hamburger svg{ color:var(--gold); }
body.dark .card,body.dark .major-card,body.dark .field-card,body.dark .info-card,body.dark .detail-top,body.dark .empty-box,body.dark .modal{ background:#171410; border-color:rgba(248,214,27,.22); }
body.dark .btn-ghost{ color:var(--gold); border-color:var(--gold); }
body.dark input,body.dark textarea,body.dark select{ background:#211c15; color:var(--text); border-color:rgba(248,214,27,.35); }
body.dark .tip-before{ background:#1c2824; border-color:#3b655a; } body.dark .tip-after{ background:#382b0b; border-color:#8c701b; }
body.dark .footer{ border-color:rgba(248,214,27,.2); }
.menu-panel{ background:#17110A; color:#fffbe4; border-inline-start:1px solid rgba(248,214,27,.35); }
.menu-panel .menu-link,.menu-panel .menu-field-link{ color:#fffbe4; }
.menu-panel .menu-link:hover,.menu-panel .menu-field-link:hover{ background:rgba(248,214,27,.14); color:var(--gold); }
.tip-label svg,.tips-heading svg{ width:15px !important; height:15px !important; }
.footer-location{ color:var(--muted); font-size:.82rem; display:flex; align-items:center; gap:5px; }
.footer-edit{ background:transparent; color:var(--teal); border:1px solid currentColor; border-radius:7px; padding:3px 8px; font-size:.72rem; }
.location-link{ display:inline-block; margin-top:6px; color:var(--teal); font-weight:700; font-size:.92rem; }
body.dark .location-link{ color:var(--gold); }
.info-item .value svg{ width:15px; height:15px; flex:0 0 15px; }
.major-card .uni svg{ width:14px; height:14px; flex:0 0 14px; margin-top:3px; }
.card h2 svg{ width:16px; height:16px; }
.careers-list svg{ width:14px; height:14px; flex:0 0 14px; }
body.dark .step{ background:#171410; border-color:rgba(248,214,27,.22); }
body.dark .step h3{ color:#fff8df; }
body.dark .step p{ color:#e2d8c4; }
.step-link{ cursor:pointer; transition:.18s; }
.step-link:hover{ transform:translateY(-2px); border-color:var(--gold); }
.major-card .go svg,.field-card .go svg{ width:14px; height:14px; }
.major-card .go,.field-card .go{ font-size:.98rem; }
.menu-design-btn{ margin-top:10px; border:1px solid rgba(248,214,27,.65); color:#fff5af; background:rgba(248,214,27,.08); border-radius:10px; padding:10px; font-weight:700; text-align:center; }
.appearance-colors label{ font-size:.78rem; color:var(--muted); font-weight:700; }
.appearance-colors input[type="color"]{ display:block; width:100%; height:42px; margin-top:6px; padding:3px; border:1px solid rgba(14,46,44,.16); border-radius:9px; background:transparent; }
body.accent-ocean{ --gold:#57d4e4; --gold-light:#d9f8fb; --teal:#126b77; --teal-2:#0d8796; --teal-light:#dceff1; }
body.accent-berry{ --gold:#ef9bb0; --gold-light:#ffe5ec; --teal:#7f2642; --teal-2:#a53b5c; --teal-light:#f8e0e8; }

/* Major advisor */
.advisor-shell{ max-width:760px; margin:0 auto; }
.advisor-hero{ background:linear-gradient(135deg,#17110A,#5d4010); color:#fffbe4; border-radius:22px; padding:30px; box-shadow:var(--shadow); }
.advisor-hero h1{ margin:0 0 8px; font-size:clamp(1.6rem,4vw,2.15rem); }
.advisor-hero p{ margin:0; color:#f4e8c5; }
.advisor-chat{ margin-top:20px; padding:22px; background:#fff; border:1px solid rgba(14,46,44,.1); border-radius:20px; box-shadow:var(--shadow); }
.advisor-bubble{ max-width:86%; padding:14px 16px; border-radius:16px 16px 16px 4px; background:var(--teal-light); color:var(--ink); font-weight:700; margin-bottom:16px; }
.advisor-options{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.advisor-option{ text-align:start; padding:13px 14px; border:1.5px solid rgba(14,46,44,.15); border-radius:13px; background:var(--paper); color:var(--text); font-weight:700; transition:.18s; }
.advisor-option:hover{ border-color:var(--gold); transform:translateY(-1px); background:var(--gold-light); }
.advisor-progress{ color:var(--muted); font-size:.82rem; margin-bottom:12px; }
.advisor-result{ text-align:center; padding:14px 0 4px; }
.advisor-result .detail-badge{ margin:0 auto 12px; }
.advisor-result h2{ margin:0 0 8px; color:var(--ink); }

let state = null;
let lang = "ar";
let isAdmin = false;
let adminSessionPassword = "";
let advisorStep = -1;
let advisorScores = {};
let theme = localStorage.getItem("libac-theme") === "dark" ? "dark" : "light";
const SHARED_DATA_URL = "/.netlify/functions/site-data";

function toggleTheme(){
  theme = theme === "dark" ? "light" : "dark";
  localStorage.setItem("libac-theme", theme);
  render();
}

async function loadState(){
  let sharedSaved = null;
  if(location.protocol !== "file:"){
    try{
      const response = await fetch(SHARED_DATA_URL, { cache:"no-store" });
      if(response.ok){ const payload = await response.json(); if(payload.data) sharedSaved = JSON.stringify(payload.data); }
    }catch(e){ console.warn("shared storage unavailable", e); }
  }
  try{
    let saved = sharedSaved || localStorage.getItem(STORAGE_KEY);
    if(!saved && window.storage?.get){
      const res = await window.storage.get(STORAGE_KEY, true);
      saved = res && res.value;
    }
    if(saved){
      state = JSON.parse(saved);
      let changed = false;
      if(!state.fields.some(f=>f.id === "higher")){
        state.fields.push({ id:"higher", icon:"star", name:{ar:"المدارس العليا", en:"Higher Schools", fr:"Écoles supérieures"} });
        changed = true;
      }
      if(!Object.prototype.hasOwnProperty.call(state,"footerLocation")){ state.footerLocation = ""; changed = true; }
      if(!Object.prototype.hasOwnProperty.call(state,"footerLocationUrl")){ state.footerLocationUrl = ""; changed = true; }
      if(!state.appearance){ state.appearance = {fontScale:1, accent:"gold", radius:16, colors:{}}; changed = true; }
      if(!state.appearance.colors){ state.appearance.colors = {}; changed = true; }
      if(!state.appearance.radius){ state.appearance.radius = 16; changed = true; }
      if(changed) await persist();
      return;
    }
  }catch(e){ /* not found or error -> fall back to default */ }
  state = defaultData();
  await persist();
}
async function persist(){
  const serialized = JSON.stringify(state);
  try{ localStorage.setItem(STORAGE_KEY, serialized); }
  catch(e){ console.error("local storage error", e); }
  try{ if(window.storage?.set) await window.storage.set(STORAGE_KEY, serialized, true); }
  catch(e){ console.error("storage error", e); }
  if(isAdmin && adminSessionPassword && location.protocol !== "file:"){
    try{
      const response = await fetch(SHARED_DATA_URL, {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-libac-admin-password":adminSessionPassword },
        body:serialized
      });
      if(!response.ok) throw new Error(`Shared save failed (${response.status})`);
    }catch(e){
      console.error("shared storage error", e);
      alert("تم حفظ التعديل محليًا فقط. تأكد من إعداد LIBAC_ADMIN_PASSWORD في Netlify.");
    }
  }
}

function parseHash(){
  const h = (location.hash || "#/home").replace(/^#\/?/, "");
  const parts = h.split("/").filter(Boolean);
  if(parts.length === 0) return {name:"home"};
  if(parts[0] === "fields") return {name:"fields"};
  if(parts[0] === "field" && parts[1]) return {name:"field", id:parts[1]};
  if(parts[0] === "major" && parts[1]) return {name:"major", id:parts[1]};
  if(parts[0] === "advisor") return {name:"advisor"};
  return {name:"home"};
}

function advisorCopy(){ return ADVISOR_COPY[lang].questions.length ? ADVISOR_COPY[lang] : {...ADVISOR_COPY[lang], questions:ADVISOR_COPY.ar.questions}; }
function startAdvisor(){ advisorStep = 0; advisorScores = {}; render(); }
function answerAdvisor(points){
  points.forEach((value,index)=>{ if(index % 2 === 0) advisorScores[value] = (advisorScores[value] || 0) + (points[index+1] || 0); });
  advisorStep += 1; render();
}
function restartAdvisor(){ advisorStep = -1; advisorScores = {}; render(); }
function advisorResult(){
  const ranked = Object.entries(advisorScores).sort((a,b)=>b[1]-a[1]);
  const fieldId = ranked.map(([id])=>state.fields.some(f=>f.id===id) ? id : null).find(Boolean);
  const majors = fieldId ? state.majors.filter(m=>m.fieldId===fieldId) : [];
  return { majors, fieldId };
}
function renderAdvisorPage(){
  const copy = advisorCopy();
  const questions = copy.questions;
  let content = "";
  if(advisorStep < 0){
    content = `<div class="advisor-result"><button class="btn btn-gold" onclick="startAdvisor()">${copy.start} ${SVG.arrow}</button></div>`;
  }else if(advisorStep < questions.length){
    const item = questions[advisorStep];
    content = `<div class="advisor-progress">${advisorStep+1} / ${questions.length} · ${copy.next}</div>
      <div class="advisor-bubble">${esc(item.q)}</div>
      <div class="advisor-options">${item.a.map(([label,points])=>`<button class="advisor-option" onclick='answerAdvisor(${JSON.stringify(points)})'>${esc(label)}</button>`).join("")}</div>`;
  }else{
    const result = advisorResult();
    if(result.majors.length){
      content = `<div class="advisor-result"><div class="eyebrow">${copy.result}</div><h2>${state.fields.find(f=>f.id===result.fieldId) ? esc(fieldName(state.fields.find(f=>f.id===result.fieldId))) : ''}</h2><p>${copy.intro}</p>
        <div class="advisor-options">${result.majors.map(m=>{ const d=majorField(m); return `<button class="advisor-option" onclick="go('#/major/${m.id}')"><strong>${esc(d.name)}</strong><br><span style="font-size:.8rem;color:var(--muted)">${esc(d.university)}</span></button>`; }).join('')}</div>
        <button class="btn btn-ghost" style="margin-top:16px" onclick="restartAdvisor()">${copy.retry}</button></div>`;
    }else{
      content = `<div class="advisor-result"><h2>${copy.unavailable}</h2><button class="btn btn-gold" onclick="restartAdvisor()">${copy.retry}</button></div>`;
    }
  }
  return `<section class="section"><div class="wrap advisor-shell"><div class="crumb"><a href="#/home">${t().breadcrumbHome}</a><span class="sep">/</span><span>${copy.menu}</span></div>
    <div class="advisor-hero"><div class="eyebrow">LIBAC AI GUIDE</div><h1>${copy.title}</h1><p>${copy.intro}</p></div>
    <div class="advisor-chat">${content}</div></div></section>${renderFooter()}`;
}

    <h2>${editing?t().editField:t().addField}</h2>
    <div class="form-row"><label>${t().fieldNameLabel} (AR)</label><input id="ff-ar" value="${esc(f.name.ar)}"></div>
    <div class="form-row"><label>${t().fieldNameLabel} (EN)</label><input id="ff-en" value="${esc(f.name.en)}"></div>
    <div class="form-row"><label>${t().fieldNameLabel} (FR)</label><input id="ff-fr" value="${esc(f.name.fr)}"></div>
    <div class="form-row"><label>${t().iconLabel}</label><select id="ff-icon">${iconOptions}</select></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">${t().cancel}</button>
      <button class="btn btn-teal btn-sm" onclick="saveField(${editing?`'${fieldId}'`:null})">${t().save}</button>
    </div>
  `);
}
async function saveField(fieldId){
  const name = { ar:document.getElementById("ff-ar").value.trim(), en:document.getElementById("ff-en").value.trim(), fr:document.getElementById("ff-fr").value.trim() };
  const icon = document.getElementById("ff-icon").value;
  if(!name.ar && !name.en && !name.fr){ return; }
  if(fieldId){
    const f = state.fields.find(x=>x.id===fieldId);
    f.name = name; f.icon = icon;
  }else{
    const id = "f_" + Date.now();
    state.fields.push({id, icon, name});
  }
  await persist();
  closeModal(); render();
}
async function deleteField(fieldId){
  if(!confirm(t().confirmDeleteField)) return;
  state.fields = state.fields.filter(f=>f.id!==fieldId);
  state.majors = state.majors.filter(m=>m.fieldId!==fieldId);
  await persist();
  render();
}

/* ---- Major form ---- */
function emptyMajorLang(){ return {name:"",university:"",location:"",duration:"",subjects:[],careers:[],tipsBefore:"",tipsAfter:""}; }

function openMajorForm(majorId, presetFieldId){
  const editing = !!majorId;
  const m = editing ? state.majors.find(x=>x.id===majorId) : {
    fieldId: presetFieldId || (state.fields[0]?state.fields[0].id:""), logoUrl:"", mapUrl:"",
    social:{facebook:"",instagram:"",telegram:"",email:""},
    ar:emptyMajorLang(), en:emptyMajorLang(), fr:emptyMajorLang()
  };
  const fieldOptions = state.fields.map(f=>`<option value="${f.id}" ${m.fieldId===f.id?"selected":""}>${esc(fieldName(f))}</option>`).join("");
  const langTab = (code,label)=>`<button type="button" class="tab-btn ${code==='ar'?'active':''}" data-tab="${code}" onclick="switchFormTab('${code}')">${label}</button>`;
  const langBlock = (code)=>{
    const d = m[code] || emptyMajorLang();
    return `<div class="tab-content ${code==='ar'?'active':''}" id="tabc-${code}">
      <div class="form-row"><label>${t().majorNameLabel}</label><input id="mf-${code}-name" value="${esc(d.name)}"></div>
      <div class="form-grid2">
        <div class="form-row"><label>${t().universityLabel}</label><input id="mf-${code}-university" value="${esc(d.university)}"></div>
        <div class="form-row"><label>${t().locationLabel}</label><input id="mf-${code}-location" value="${esc(d.location)}"></div>
      </div>
      <div class="form-row"><label>${t().durationLabel}</label><input id="mf-${code}-duration" value="${esc(d.duration)}"></div>
      <div class="form-row"><label>${t().subjectsLabel}</label><textarea id="mf-${code}-subjects">${esc((d.subjects||[]).join(", "))}</textarea></div>
      <div class="form-row"><label>${t().careersLabel}</label><textarea id="mf-${code}-careers">${esc((d.careers||[]).join(", "))}</textarea></div>
      <div class="form-row"><label>${t().tipsBeforeLabel}</label><textarea id="mf-${code}-tipsBefore">${esc(d.tipsBefore)}</textarea></div>
      <div class="form-row"><label>${t().tipsAfterLabel}</label><textarea id="mf-${code}-tipsAfter">${esc(d.tipsAfter)}</textarea></div>
    </div>`;
  };
  const s = m.social || {};
  openModal(`
    <h2>${editing?t().editMajor:t().addMajor}</h2>
    <div class="form-row"><label>${t().selectField}</label><select id="mf-fieldId">${fieldOptions}</select></div>
    <div class="form-row"><label>${t().logoUrlLabel}</label><input id="mf-logoUrl" value="${esc(m.logoUrl)}" placeholder="https://..."></div>
    <div class="form-row"><label>${t().mapUrlLabel}</label><input id="mf-mapUrl" value="${esc(m.mapUrl || '')}" placeholder="https://maps.google.com/..."></div>

    <div class="tabs">${langTab('ar','العربية')}${langTab('en','English')}${langTab('fr','Français')}</div>
    ${langBlock('ar')}${langBlock('en')}${langBlock('fr')}

    <div class="form-row" style="margin-top:6px;">
      <label>${t().socialTitle}</label>
      <div class="form-grid2">
        <input id="mf-social-facebook" placeholder="${t().facebookLabel} URL" value="${esc(s.facebook)}">
        <input id="mf-social-instagram" placeholder="${t().instagramLabel} URL" value="${esc(s.instagram)}">
        <input id="mf-social-telegram" placeholder="${t().telegramLabel} URL" value="${esc(s.telegram)}">
        <input id="mf-social-email" placeholder="${t().emailLabel}" value="${esc(s.email)}">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">${t().cancel}</button>
      <button class="btn btn-teal btn-sm" onclick="saveMajor(${editing?`'${majorId}'`:null})">${t().save}</button>
    </div>
  `);
}
function switchFormTab(code){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.tab===code));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.toggle("active", c.id==="tabc-"+code));
}
async function saveMajor(majorId){
  const fieldId = document.getElementById("mf-fieldId").value;
  const logoUrl = document.getElementById("mf-logoUrl").value.trim();
  const mapUrl = document.getElementById("mf-mapUrl").value.trim();
  const social = {
    facebook: document.getElementById("mf-social-facebook").value.trim(),
    instagram: document.getElementById("mf-social-instagram").value.trim(),
    telegram: document.getElementById("mf-social-telegram").value.trim(),
    email: document.getElementById("mf-social-email").value.trim(),
  };
  const langs = {};
  ["ar","en","fr"].forEach(code=>{
    langs[code] = {
      name: document.getElementById(`mf-${code}-name`).value.trim(),
      university: document.getElementById(`mf-${code}-university`).value.trim(),
      location: document.getElementById(`mf-${code}-location`).value.trim(),
      duration: document.getElementById(`mf-${code}-duration`).value.trim(),
      subjects: document.getElementById(`mf-${code}-subjects`).value.split(",").map(s=>s.trim()).filter(Boolean),
      careers: document.getElementById(`mf-${code}-careers`).value.split(",").map(s=>s.trim()).filter(Boolean),
      tipsBefore: document.getElementById(`mf-${code}-tipsBefore`).value.trim(),
      tipsAfter: document.getElementById(`mf-${code}-tipsAfter`).value.trim(),
    };
  });
  if(!langs.ar.name && !langs.en.name && !langs.fr.name) return;

  if(majorId){
    const m = state.majors.find(x=>x.id===majorId);
    Object.assign(m, {fieldId, logoUrl, mapUrl, social, ar:langs.ar, en:langs.en, fr:langs.fr});
  }else{
    const id = "m_" + Date.now();
    state.majors.push({id, fieldId, logoUrl, mapUrl, social, ar:langs.ar, en:langs.en, fr:langs.fr});
  }
  await persist();
  closeModal(); render();
}
async function deleteMajor(majorId){
  if(!confirm(t().confirmDeleteMajor)) return;
  const m = state.majors.find(x=>x.id===majorId);
  const fieldId = m ? m.fieldId : null;
  state.majors = state.majors.filter(x=>x.id!==majorId);
  await persist();
  go(fieldId?`#/field/${fieldId}`:"#/fields");
}

/* =========================================================
   MAIN RENDER
========================================================= */
function setLang(l){ lang = l; render(); }

function render(){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang==="ar" ? "rtl" : "ltr";
  const appearance = state && state.appearance ? state.appearance : {fontScale:1, accent:"gold", radius:16, colors:{}};
  document.documentElement.style.fontSize = (appearance.fontScale * 100) + "%";
  document.body.className = "lang-" + lang + (theme === "dark" ? " dark" : "") + " accent-" + appearance.accent;
  document.documentElement.style.setProperty("--radius", (appearance.radius || 16) + "px");
  const customColors = appearance.colors || {};
  ["gold","teal","paper"].forEach(key=>{
    if(key === "paper" && theme === "dark") document.body.style.removeProperty("--" + key);
    else if(customColors[key]) document.body.style.setProperty("--" + key, customColors[key]);
    else document.body.style.removeProperty("--" + key);
  });
  document.title = t().siteName + " | " + t().tagline;

  const route = parseHash();
  let bodyHtml = "";
  if(route.name==="home") bodyHtml = renderHome();
  else if(route.name==="fields") bodyHtml = renderFieldsPage();
  else if(route.name==="field") bodyHtml = renderFieldPage(route.id);
  else if(route.name==="major") bodyHtml = renderMajorPage(route.id);
  else if(route.name==="advisor") bodyHtml = renderAdvisorPage();

  document.getElementById("app").innerHTML = renderHeader() + bodyHtml;
  renderMenu();
}

window.addEventListener("hashchange", render);

/* =========================================================
   INIT
========================================================= */
(async function init(){
  document.getElementById("app").innerHTML = `<div style="padding:80px;text-align:center;color:#5B6B67;">…</div>`;
  await loadState();
  render();
})();
</script>
</body>
